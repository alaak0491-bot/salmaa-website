<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>

.container {
    text-align: center;
    margin-top: 100px;
    font-family: Arial;
}

.envelope {
    font-size: 80px;
    cursor: pointer;
    transition: transform 0.3s;
}

.envelope:hover {
    transform: scale(1.1);
}

.letter {
    margin-top: 30px;
    padding: 20px;
    width: 60%;
    margin-left: auto;
    margin-right: auto;
    background: #fff;
    border-radius: 10px;
    box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
}

.hidden {
    display: none;
}
    
body {
    text-align: center;
    font-family: Arial;
    background-color: #ffe6e6;
    padding-top: 100px;
}

h1 {
    font-size: 28px;
}

p {
    font-size: 20px;
    margin-top: 10px;
}

button {
    margin-top: 30px;
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background-color: #ff4d6d;
    color: white;
    cursor: pointer;
}

button:hover {
    background-color: #ff1a4d;
}
</style>

</head>

<body>

<h1>عارف انك زعلانه و مخنوقة مني </h1>
<p>🙄يلا نفصل و نلعب لعبه صغيرة ؟</p>

<button onclick="goNext()">يلا 😌</button>

<script>
function goNext() {
    document.body.innerHTML = `

}

}

    function wrongMove(id) {

    btn.style.position = "relative";

}

    function rightAnswer() {
    document.body.innerHTML = `

}

function nextPage() {
    document.body.innerHTML = `

}

    function nextPage() {
    document.body.innerHTML = `
    <div class="container">

            ✉️ افتحي
        </div>

        <div id="letter" class="letter hidden">

        <button onclick="finalPage()">كملي </button>

}

    


</script>

</html>
